<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c14"/>
      <stop offset="100%" style="stop-color:#12121e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="880" height="540" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="270" x2="880" y2="270" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="440" y1="0" x2="440" y2="540" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- === LOGO SECTION === -->
  <!-- Outer ring -->
  <circle cx="88" cy="108" r="44" fill="none" stroke="url(#accent)" stroke-width="5" opacity="0.9"/>
  <!-- Inner dot -->
  <circle cx="88" cy="108" r="22" fill="url(#accent)"/>
  <!-- Small accent dot -->
  <circle cx="88" cy="64" r="6" fill="#818cf8"/>

  <!-- Wordmark -->
  <text x="152" y="97" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#ffffff" letter-spacing="-1">Artifact</text>
  <text x="152" y="138" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="40" font-weight="300" fill="#6366f1" letter-spacing="-1">Hub</text>

  <!-- Tagline -->
  <text x="88" y="194" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" fill="#5a5a7a" letter-spacing="3.5" text-anchor="start">PUBLISH · REVIEW · SHARE</text>

  <!-- Label -->
  <text x="748" y="32" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#3a3a52" letter-spacing="2" text-anchor="end">BRAND IDENTITY v1.0</text>
  <text x="748" y="48" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#3a3a52" letter-spacing="2" text-anchor="end">GENERATED BY CLAUDE · MAY 2026</text>

  <!-- Divider -->
  <line x1="64" y1="230" x2="816" y2="230" stroke="#1e1e32" stroke-width="1.5"/>

  <!-- === COLOUR PALETTE === -->
  <text x="64" y="266" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#3a3a52" letter-spacing="2.5">PRIMARY PALETTE</text>

  <!-- Swatch 1 - Primary Indigo -->
  <rect x="64" y="280" width="108" height="64" rx="8" fill="#6366f1"/>
  <text x="64" y="362" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#4a4a6a">Indigo 500</text>
  <text x="64" y="374" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#3a3a52">#6366f1</text>

  <!-- Swatch 2 - Light Indigo -->
  <rect x="188" y="280" width="108" height="64" rx="8" fill="#818cf8"/>
  <text x="188" y="362" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#4a4a6a">Indigo 400</text>
  <text x="188" y="374" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#3a3a52">#818cf8</text>

  <!-- Swatch 3 - Dark Indigo -->
  <rect x="312" y="280" width="108" height="64" rx="8" fill="#4f46e5"/>
  <text x="312" y="362" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#4a4a6a">Indigo 600</text>
  <text x="312" y="374" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#3a3a52">#4f46e5</text>

  <!-- Swatch 4 - Background -->
  <rect x="436" y="280" width="108" height="64" rx="8" fill="#0c0c14" stroke="#2a2a3e" stroke-width="1"/>
  <text x="436" y="362" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#4a4a6a">Background</text>
  <text x="436" y="374" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#3a3a52">#0c0c14</text>

  <!-- Swatch 5 - Surface -->
  <rect x="560" y="280" width="108" height="64" rx="8" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
  <text x="560" y="362" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#4a4a6a">Surface</text>
  <text x="560" y="374" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#3a3a52">#1a1a2e</text>

  <!-- Swatch 6 - White -->
  <rect x="684" y="280" width="108" height="64" rx="8" fill="#ffffff"/>
  <text x="684" y="362" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#4a4a6a">White</text>
  <text x="684" y="374" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#3a3a52">#ffffff</text>

  <!-- === TYPOGRAPHY === -->
  <line x1="64" y1="404" x2="816" y2="404" stroke="#1e1e32" stroke-width="1"/>
  <text x="64" y="430" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10" fill="#3a3a52" letter-spacing="2.5">TYPEFACE</text>

  <text x="64" y="462" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Helvetica Neue Bold — Headings</text>
  <text x="64" y="490" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" font-weight="300" fill="#8888aa">Light weight for body copy and captions at 14–16px</text>
  <text x="64" y="514" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a7a" letter-spacing="1">ABCDEFGHIJKLMNOPQRSTUVWXYZ  abcdefghijklmnopqrstuvwxyz  0123456789</text>
</svg>
